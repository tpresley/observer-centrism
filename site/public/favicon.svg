<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="60%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2535"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </radialGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.45"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#2563eb" stroke-width="1.8" opacity="0.65"/>
  <!-- Bright arc (outer, ~270°) -->
  <path d="M 32,32 m 26,0 A 26,26 0 1 1 36.1,6.5" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.9" filter="url(#g)"/>
  <!-- Closure dot -->
  <circle cx="56.1" cy="27.3" r="2" fill="#eff6ff" filter="url(#g)" opacity="0.85"/>
  <!-- Inner triangle nodes -->
  <circle cx="32" cy="17" r="2.5" fill="#2563eb" filter="url(#g)"/>
  <circle cx="19" cy="39" r="2.5" fill="#2563eb" filter="url(#g)"/>
  <circle cx="45" cy="39" r="2.5" fill="#2563eb" filter="url(#g)"/>
  <!-- Inner triangle edges -->
  <line x1="32" y1="17" x2="19" y2="39" stroke="#93c5fd" stroke-width="1.2" opacity="0.7"/>
  <line x1="19" y1="39" x2="45" y2="39" stroke="#93c5fd" stroke-width="1.2" opacity="0.7"/>
  <line x1="45" y1="39" x2="32" y2="17" stroke="#93c5fd" stroke-width="1.2" opacity="0.7"/>
  <!-- Core -->
  <circle cx="32" cy="32" r="5.5" fill="url(#core)" filter="url(#g)"/>
  <circle cx="32" cy="32" r="2.5" fill="#eff6ff" opacity="0.95"/>
</svg>
