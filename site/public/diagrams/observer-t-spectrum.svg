<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" role="img" aria-labelledby="t-spectrum-title t-spectrum-desc" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <title id="t-spectrum-title">The allowed observer-period spectrum</title>
  <desc id="t-spectrum-desc">A horizontal log-T axis showing six structurally distinct regions: the null boundary at T equals 0 (photons as Type-I quanta), a sub-Planckian forbidden region (black-hole regime) bounded above by the hard cutoff T_P, a discrete elementary observer tower spanning T_P to T_nu, a continuous composite spectrum overlaying the allowed band from T_P to T_H, the soft horizon ceiling at T_H, and a beyond-horizon forbidden region. The lower cutoff is hard (a sharp gravitational regime change); the upper cutoff is soft (continuous coherence bleed to the horizon).</desc>

  <defs>
    <pattern id="forbiddenHatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#fee2e2"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#dc2626" stroke-width="1.4"/>
    </pattern>
    <linearGradient id="softFade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#dbeafe" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#fef3c7" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fee2e2" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="820" height="380" fill="#fafaf9"/>

  <!-- Region 2: sub-Planckian forbidden (T = 0 to T_P) -->
  <rect x="40" y="120" width="120" height="80" fill="url(#forbiddenHatch)"/>

  <!-- Allowed band: T_P to T_H, base layer (light blue) -->
  <rect x="160" y="120" width="500" height="80" fill="#dbeafe"/>

  <!-- Continuous composite overlay (amber translucent across allowed band) -->
  <rect x="160" y="160" width="500" height="40" fill="#fef3c7" opacity="0.85"/>

  <!-- Soft transition zone near T_H -->
  <rect x="640" y="120" width="40" height="80" fill="url(#softFade)" opacity="0.85"/>

  <!-- Region 6: beyond-horizon forbidden -->
  <rect x="680" y="120" width="100" height="80" fill="url(#forbiddenHatch)"/>

  <!-- Discrete elementary tower ticks (T_P to T_nu region) -->
  <g stroke="#16a34a" stroke-width="2.4" stroke-linecap="round">
    <line x1="172" y1="124" x2="172" y2="156"/>
    <line x1="190" y1="124" x2="190" y2="156"/>
    <line x1="206" y1="124" x2="206" y2="156"/>
    <line x1="224" y1="124" x2="224" y2="156"/>
    <line x1="262" y1="124" x2="262" y2="156"/>
    <line x1="284" y1="124" x2="284" y2="156"/>
    <line x1="298" y1="124" x2="298" y2="156"/>
    <line x1="320" y1="124" x2="320" y2="156"/>
    <line x1="490" y1="124" x2="490" y2="156"/>
  </g>

  <!-- Cutoff vertical guide lines -->
  <g stroke="#1c1917" stroke-width="1.5">
    <line x1="160" y1="116" x2="160" y2="208"/>
    <line x1="490" y1="116" x2="490" y2="208" stroke="#16a34a" stroke-dasharray="3,2"/>
    <line x1="660" y1="116" x2="660" y2="208" stroke-dasharray="4,3"/>
  </g>

  <!-- Edge markers -->
  <g stroke="#1c1917" stroke-width="1.5">
    <line x1="40" y1="116" x2="40" y2="208"/>
    <line x1="780" y1="116" x2="780" y2="208"/>
  </g>

  <!-- Region annotations above band -->
  <g font-size="12" fill="#1c1917">
    <text x="100" y="100" text-anchor="middle" font-weight="600" fill="#dc2626">forbidden</text>
    <text x="100" y="114" text-anchor="middle" font-size="10" fill="#78716c">sub-Planckian (BH regime)</text>

    <text x="325" y="100" text-anchor="middle" font-weight="600" fill="#16a34a">discrete elementary tower</text>
    <text x="325" y="114" text-anchor="middle" font-size="10" fill="#78716c">finite set, structurally selected</text>

    <text x="730" y="100" text-anchor="middle" font-weight="600" fill="#dc2626">forbidden</text>
    <text x="730" y="114" text-anchor="middle" font-size="10" fill="#78716c">beyond horizon</text>
  </g>

  <!-- Continuous composite label inside band -->
  <text x="410" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">continuous composite spectrum</text>

  <!-- Cutoff axis labels below band -->
  <g font-size="13" fill="#1c1917">
    <!-- T = 0 -->
    <text x="40" y="226" text-anchor="middle" font-weight="600">T = 0</text>
    <text x="40" y="242" text-anchor="middle" font-size="10" fill="#78716c">photon</text>
    <text x="40" y="255" text-anchor="middle" font-size="10" fill="#78716c">(Type-I quantum)</text>

    <!-- T_P -->
    <text x="160" y="226" text-anchor="middle">
      <tspan font-style="italic">T</tspan><tspan font-size="10" baseline-shift="sub">P</tspan>
    </text>
    <text x="160" y="242" text-anchor="middle" font-size="10" fill="#78716c">hard cutoff</text>
    <text x="160" y="255" text-anchor="middle" font-size="10" fill="#78716c">(BH regime change)</text>

    <!-- T_nu -->
    <text x="490" y="226" text-anchor="middle" fill="#16a34a">
      <tspan font-style="italic">T</tspan><tspan font-size="10" baseline-shift="sub">ν</tspan>
    </text>
    <text x="490" y="242" text-anchor="middle" font-size="10" fill="#78716c">lightest elementary</text>
    <text x="490" y="255" text-anchor="middle" font-size="10" fill="#78716c">observer</text>

    <!-- T_H -->
    <text x="660" y="226" text-anchor="middle">
      <tspan font-style="italic">T</tspan><tspan font-size="10" baseline-shift="sub">H</tspan>
    </text>
    <text x="660" y="242" text-anchor="middle" font-size="10" fill="#78716c">soft cutoff</text>
    <text x="660" y="255" text-anchor="middle" font-size="10" fill="#78716c">(coherence bleed)</text>

    <!-- T → ∞ -->
    <text x="780" y="226" text-anchor="middle" font-weight="600">
      <tspan font-style="italic">T</tspan> → ∞
    </text>
  </g>

  <!-- Axis line -->
  <line x1="40" y1="208" x2="780" y2="208" stroke="#78716c" stroke-width="1"/>

  <!-- Axis description -->
  <text x="410" y="285" text-anchor="middle" font-size="13" fill="#1c1917">
    Observer minimal period <tspan font-style="italic">T</tspan><tspan font-size="10" baseline-shift="sub">𝒪</tspan> (log scale, smaller
    <tspan font-style="italic">T</tspan> = larger rest mass)
  </text>

  <!-- Legend -->
  <g transform="translate(40, 320)" font-size="11" fill="#1c1917">
    <rect x="0" y="0" width="16" height="11" fill="url(#forbiddenHatch)"/>
    <text x="22" y="9.5">forbidden region</text>

    <rect x="135" y="0" width="16" height="11" fill="#dbeafe"/>
    <text x="157" y="9.5">allowed band</text>

    <line x1="245" y1="0" x2="245" y2="11" stroke="#16a34a" stroke-width="2.4" stroke-linecap="round"/>
    <text x="253" y="9.5">elementary observer</text>

    <rect x="375" y="0" width="16" height="11" fill="#fef3c7"/>
    <text x="397" y="9.5">continuous composites</text>

    <rect x="535" y="0" width="16" height="11" fill="url(#softFade)"/>
    <text x="557" y="9.5">soft transition</text>
  </g>

  <!-- Subtle annotation: hard vs soft asymmetry -->
  <g font-size="10" fill="#78716c" font-style="italic">
    <text x="160" y="350" text-anchor="middle">hard: matter-vs-spacetime</text>
    <text x="660" y="350" text-anchor="middle">soft: local-vs-cosmological</text>
  </g>
</svg>
